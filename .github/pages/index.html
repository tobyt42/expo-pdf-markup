<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@tobyt/expo-pdf-markup</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0d1117;
        color: #e6edf3;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        max-width: 600px;
        width: 100%;
        text-align: center;
      }

      .badge {
        display: inline-block;
        background: #1f2937;
        border: 1px solid #30363d;
        border-radius: 9999px;
        padding: 0.25rem 0.75rem;
        font-size: 0.75rem;
        color: #7d8590;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.25rem);
        font-weight: 700;
        color: #f0f6fc;
        margin-bottom: 0.75rem;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      }

      .description {
        font-size: 1rem;
        color: #8b949e;
        line-height: 1.6;
        margin-bottom: 2.5rem;
        max-width: 420px;
        margin-left: auto;
        margin-right: auto;
      }

      .cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 2.5rem;
      }

      @media (max-width: 400px) {
        .cards {
          grid-template-columns: 1fr;
        }
      }

      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        padding: 1.5rem 1rem;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        text-decoration: none;
        color: inherit;
        transition:
          border-color 0.15s,
          background 0.15s,
          transform 0.1s;
      }

      .card:hover {
        border-color: #58a6ff;
        background: #1c2230;
        transform: translateY(-2px);
      }

      .card-icon {
        font-size: 2rem;
        line-height: 1;
      }

      .card-title {
        font-size: 0.9375rem;
        font-weight: 600;
        color: #f0f6fc;
      }

      .card-subtitle {
        font-size: 0.8125rem;
        color: #8b949e;
      }

      .links {
        display: flex;
        gap: 1.25rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .links a {
        font-size: 0.875rem;
        color: #58a6ff;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }

      .links a:hover {
        text-decoration: underline;
      }

      .links a svg {
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="badge">Expo Module</div>

      <h1>@tobyt/expo-pdf-markup</h1>

      <p class="description">
        Display and annotate PDFs in Expo apps. Native PDFKit on iOS, PdfRenderer on Android, and
        pdfjs on web.
      </p>

      <div class="cards">
        <a href="api/" class="card">
          <span class="card-icon">📖</span>
          <span class="card-title">API Reference</span>
          <span class="card-subtitle">TypeDoc documentation</span>
        </a>
        <a href="example/" class="card">
          <span class="card-icon">🚀</span>
          <span class="card-title">Example App</span>
          <span class="card-subtitle">Live demo in the browser</span>
        </a>
      </div>

      <div class="links">
        <a
          href="https://github.com/tobyt42/expo-pdf-markup"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
          GitHub
        </a>
        <a href="https://www.npmjs.com/package/@tobyt/expo-pdf-markup" target="_blank" rel="noopener noreferrer">
          <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor">
            <path d="M0 0v16h16V0H0zm13.5 13.5H8v-9h-2.5v9H2.5V2.5h11v11z"/>
          </svg>
          npm
        </a>
      </div>
    </div>
  </body>
</html>
