version: 2
updates:
  # Root library package
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "expo*"
      - dependency-name: "@expo/*"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "@types/react"
      - dependency-name: "react-native*"
      - dependency-name: "@react-native/*"

  # Example app
  - package-ecosystem: npm
    directory: /example
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "expo*"
      - dependency-name: "@expo/*"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "@types/react"
      - dependency-name: "react-native*"
      - dependency-name: "@react-native/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
