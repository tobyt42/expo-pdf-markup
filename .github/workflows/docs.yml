name: Deploy docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Install root dependencies (needed for typedoc and the module source)
      - run: npm ci

      # Build TypeDocs into site/api/
      - run: npm run docs -- --out site/api

      # Install example app dependencies
      - run: npm ci
        working-directory: example

      # Export example app as a static web bundle into site/example/
      - run: npx expo export --platform web --output-dir ../site/example
        working-directory: example

      # Assemble the site root: landing page + .nojekyll
      - run: |
          cp .github/pages/index.html site/index.html
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
