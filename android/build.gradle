plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'dev.terhoeven.expopdfmarkup'
version = '0.1.0'

android {
  namespace "dev.terhoeven.expopdfmarkup"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  testImplementation 'junit:junit:4.13.2'
  testImplementation 'org.json:json:20231013'
}

tasks.withType(Test) {
  testLogging {
    events "passed", "failed", "skipped"
    showStandardStreams = false
  }
}
